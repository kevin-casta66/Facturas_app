<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Document shadow/glow -->
  <rect x="136" y="106" width="240" height="300" rx="20" fill="#4f46e5" opacity="0.12" filter="url(#glow)"/>
  <!-- Document body -->
  <rect x="136" y="106" width="240" height="300" rx="20" fill="#0f172a" stroke="#4f46e5" stroke-width="2.5"/>
  <!-- Document header accent -->
  <rect x="136" y="106" width="240" height="52" rx="20" fill="url(#accent)"/>
  <rect x="136" y="132" width="240" height="26" fill="url(#accent)"/>
  <!-- Header text lines -->
  <rect x="162" y="124" width="100" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="162" y="138" width="70" height="6" rx="3" fill="white" opacity="0.6"/>
  <!-- Invoice number badge -->
  <rect x="296" y="120" width="60" height="20" rx="10" fill="white" opacity="0.2"/>
  <rect x="302" y="126" width="48" height="8" rx="4" fill="white" opacity="0.8"/>
  <!-- Line items -->
  <rect x="162" y="178" width="188" height="6" rx="3" fill="#334155"/>
  <rect x="162" y="196" width="130" height="9" rx="4.5" fill="#4f46e5" opacity="0.8"/>
  <rect x="308" y="196" width="42" height="9" rx="4.5" fill="#6366f1" opacity="0.8"/>
  <rect x="162" y="216" width="110" height="9" rx="4.5" fill="#4f46e5" opacity="0.6"/>
  <rect x="308" y="216" width="42" height="9" rx="4.5" fill="#6366f1" opacity="0.6"/>
  <rect x="162" y="236" width="140" height="9" rx="4.5" fill="#4f46e5" opacity="0.6"/>
  <rect x="308" y="236" width="42" height="9" rx="4.5" fill="#6366f1" opacity="0.6"/>
  <!-- Divider -->
  <rect x="162" y="260" width="188" height="2" rx="1" fill="#1e293b"/>
  <!-- Subtotal row -->
  <rect x="162" y="272" width="90" height="8" rx="4" fill="#334155"/>
  <rect x="308" y="272" width="42" height="8" rx="4" fill="#334155"/>
  <!-- Total highlight -->
  <rect x="156" y="290" width="200" height="28" rx="8" fill="#4f46e5" opacity="0.15"/>
  <rect x="162" y="298" width="80" height="10" rx="5" fill="url(#accent)"/>
  <rect x="290" y="296" width="66" height="14" rx="7" fill="url(#accent)"/>
  <!-- Stamp/check circle -->
  <circle cx="380" cy="370" r="68" fill="#020617" stroke="url(#accent)" stroke-width="3"/>
  <circle cx="380" cy="370" r="58" fill="url(#accent)" opacity="0.15"/>
  <path d="M356 370 L373 388 L406 350" stroke="#6366f1" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
